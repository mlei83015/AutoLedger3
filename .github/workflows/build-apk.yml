name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build Debug APK
        shell: bash
        run: |
          set +e
          gradle :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "Gradle build failed. Last lines are also emitted as annotations."
            tail -n 80 build-output.log | while IFS= read -r line; do
              line="${line//'%'/'%25'}"
              line="${line//$'\n'/'%0A'}"
              line="${line//$'\r'/'%0D'}"
              echo "::error title=Gradle build::$line"
            done
          fi
          exit "$status"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AutoLedger-build-log
          path: build-output.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoLedger-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
